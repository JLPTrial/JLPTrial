name: Performance
description: Lentidão, travamentos ou consumo alto de recursos
title: "<Seu Título>"
labels: ["Performance", "status: Aguardando revisão"]
body:
  - type: markdown
    attributes:
      value: "# Informe onde ocorre e como medir o problema. NÃO ESQUEÇA DE TROCAR O TÍTULO"
  - type: textarea
    id: descricao
    attributes:
      label: Descrição
    validations:
      required: true
  - type: dropdown
    id: tipo_de_problema
    attributes:
      label: Tipo de problema
      description: Selecione o tipo de problema de performance encontrado.
      options:
        - Lentidão
        - Travamentos
        - Alto consumo de bateria
        - Celular esquentando
    validations:
      required: true
  - type: textarea
    id: onde
    attributes:
      label: Dê mais detalhes do problema (Especifique a tela, o que você estava fazendo e o que observou)
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: "1. Abra o aplicativo\n2.\n3."
    validations:
      required: true
  - type: dropdown
    id: plataforma
    attributes:
      label: Plataforma
      description: Selecione a plataforma onde o problema de performance foi encontrado
      options:
        - Android
        - WEB
    validations:
      required: true
  - type: input
    id: dispositivo_android
    attributes:
      label: Qual o seu dispositivo Android? (Se usou o aplicativo)
      placeholder: "ex: Samsung Galaxy S21, Realme C75, Motorola Moto G9, etc."
  - type: input
    id: versao_android
    attributes:
      label: Qual a versão do Android do aparelho? (Se usou o aplicativo)
      placeholder: "ex: Android 9.0, Android 14, etc..."
  - type: dropdown
    id: browser
    attributes:
      label: Navegador
      description: Qual o navegador que você usou para acessar a versão WEB (se usou a versão WEB)
      options:
        - Google Chrome
        - Microsoft Edge
        - Firefox
        - Opera
        - Safari
        - Outros
        - N/A
  - type: input
    id: versao_app
    attributes:
      label: Versão do app (Você pode ver ela no canto inferior esquerdo do menu principal)
    validations:
      required: true
  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: Insira qualquer outra informação extra que julgar relevante

