name: SonarQube Analysis

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install app dependencies
        working-directory: ./app
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          elif [ -f package.json ]; then
            npm install --ignore-scripts
          else
            echo "package.json not found in app; skipping npm install"
          fi

      - name: Run app tests with coverage
        working-directory: ./app
        run: |
          if npm run | grep -q " test"; then
            npm test -- --coverage --watchAll=false
          else
            echo "No test script found in app; skipping tests"
          fi

      - name: Install web dependencies
        working-directory: ./web
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          elif [ -f package.json ]; then
            npm install --ignore-scripts
          else
            echo "package.json not found in web; skipping npm install"
          fi

      - name: Run web tests with coverage
        working-directory: ./web
        run: |
          if npm run | grep -q " test"; then
            npm test -- --coverage --watchAll=false
          else
            echo "No test script found in web; skipping tests"
          fi

      - name: Install server dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          fi
          pip install --no-cache-dir pytest-cov

      - name: Run server tests with coverage
        working-directory: ./server
        run: |
          if [ -d tests ] || [ -d src/tests ]; then
            pytest --cov=src --cov-report=xml:coverage.xml
          else
            echo "No tests directory found in server; skipping tests"
          fi

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
