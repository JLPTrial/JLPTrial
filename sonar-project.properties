sonar.projectKey=JLPTrial
sonar.projectName=JLPTrial
sonar.projectVersion=1.0.0
sonar.organization=JLPTrial
sonar.host.url=https://sonarcloud.io

sonar.sourceEncoding=UTF-8
sonar.sources=app,web,server,database

sonar.exclusions=**/scripts/**,**/node_modules/**,**/.venv/**,**/venv/**,**/dist/**,**/build/**,**/.expo/**,**/android/**,**/ios/**,**/__pycache__/**,**/*.min.js,testing/**,tmp/**
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/__tests__/**

sonar.javascript.lcov.reportPaths=app/coverage/lcov.info,web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=app/coverage/lcov.info,web/coverage/lcov.info
sonar.python.coverage.reportPaths=server/coverage.xml
